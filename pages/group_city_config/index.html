<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>分群城市映射</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f6fa;
    color: #2c3e50;
    padding: 24px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #7f8c8d; font-size: 13px; margin-bottom: 24px; }

  .form-row {
    display: flex; gap: 12px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap;
  }
  .field { display: flex; flex-direction: column; gap: 4px; min-width: 200px; flex: 1; }
  .field label { font-size: 12px; font-weight: 600; color: #576574; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input {
    padding: 8px 12px; border: 1px solid #dcdde1; border-radius: 6px;
    font-size: 14px; outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: #3498db; }
  .field input::placeholder { color: #b2bec3; }

  button {
    padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
    cursor: pointer; font-weight: 500; transition: background .2s, opacity .2s;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .btn-primary { background: #3498db; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #2980b9; }
  .btn-ghost { background: transparent; color: #e74c3c; padding: 4px 8px; font-size: 13px; }
  .btn-ghost:hover { background: #fde8e8; }
  .btn-blue-sm { background: #3498db; color: #fff; padding: 4px 12px; font-size: 13px; }
  .btn-cancel { background: #b2bec3; color: #fff; }
  .btn-cancel:hover { background: #95a5a6; }

  .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 16px; font-size: 14px; }
  th {
    background: #f8f9fa; font-weight: 600; color: #636e72;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e9ecef;
  }
  td { border-bottom: 1px solid #f1f2f6; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }

  .city-badge {
    display: inline-block; background: #e8f4fd; color: #2980b9;
    padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: 500;
  }
  .empty { padding: 40px; text-align: center; color: #b2bec3; font-size: 14px; }

  .toast {
    position: fixed; top: 20px; right: 20px; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; z-index: 999; animation: fadeOut 0.3s 2.2s forwards;
  }
  .toast.success { background: #27ae60; color: #fff; }
  .toast.error { background: #c0392b; color: #fff; }
  @keyframes fadeOut { to { opacity: 0; } }

  .note { font-size: 12px; color: #95a5a6; margin-top: 16px; }
  .note code { background: #ecf0f1; padding: 1px 5px; border-radius: 3px; font-size: 11px; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .form-row { flex-direction: column; }
    .field { min-width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🏙️ 分群城市映射</h1>
  <p class="subtitle">为不同群聊配置独立的天气预报推送城市，未配置的群将使用默认城市</p>

  <div class="form-row">
    <div class="field">
      <label>群聊标识符 (origin)</label>
      <input id="inputOrigin" placeholder="napcat:GroupMessage:群号" />
    </div>
    <div class="field">
      <label>推送城市</label>
      <input id="inputCity" placeholder="例如 上海" />
    </div>
    <button id="btnSave" class="btn-primary" style="align-self:flex-end">保存映射</button>
    <button id="btnCancel" class="btn-cancel" style="align-self:flex-end;display:none">取消编辑</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr><th style="width:45%">群聊标识符</th><th style="width:30%">推送城市</th><th style="width:25%">操作</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <p class="note">
    💡 格式：<code>平台名:消息类型:群号</code>，如 <code>napcat:GroupMessage:1350989414</code>
    · 默认城市：<strong id="defaultCity">-</strong>
  </p>
</div>

<script>
  let bridge = window.AstrBotPluginPage;
  let mappings = [];
  let editingOrigin = null;

  async function waitBridge(retries) {
    if (bridge) return;
    for (var i = 0; i < retries; i++) {
      bridge = window.AstrBotPluginPage;
      if (bridge) return;
      await new Promise(function (r) { setTimeout(r, 500); });
    }
    throw new Error('Bridge SDK not injected');
  }

  function toast(msg, cls) {
    var t = document.createElement('div');
    t.className = 'toast ' + (cls || 'success');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 2500);
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function render() {
    var tbody = document.getElementById('tbody');
    if (!mappings.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">暂无映射配置，请在上方添加</td></tr>';
      return;
    }
    tbody.innerHTML = mappings.map(function (m, i) {
      return '<tr><td><code>' + esc(m.origin) + '</code></td>'
        + '<td><span class="city-badge">' + esc(m.city) + '</span></td>'
        + '<td><button class="btn-blue-sm" onclick="editItem(' + i + ')">编辑</button> '
        + '<button class="btn-ghost" onclick="deleteItem(' + i + ')">删除</button></td></tr>';
    }).join('');
  }

  async function loadMappings() {
    try {
      var data = await bridge.apiGet('group_cities');
      mappings = data.items || [];
      document.getElementById('defaultCity').textContent = data.default_city || '未设置';
      render();
    } catch (e) {
      toast('加载失败: ' + e.message, 'error');
    }
  }

  async function saveMapping(origin, city) {
    try {
      var result = await bridge.apiPost('group_cities', { origin: origin, city: city });
      toast(result.message || (editingOrigin ? '已更新' : '已添加'));
      resetForm();
      await loadMappings();
    } catch (e) {
      toast('保存失败: ' + e.message, 'error');
    }
  }

  async function doDelete(origin) {
    if (!confirm('确认删除 ' + origin + ' 的映射吗？')) return;
    try {
      var result = await bridge.apiPost('group_cities/delete', { origin: origin });
      toast(result.message || '已删除');
      await loadMappings();
    } catch (e) {
      toast('删除失败: ' + e.message, 'error');
    }
  }

  function resetForm() {
    document.getElementById('inputOrigin').value = '';
    document.getElementById('inputCity').value = '';
    editingOrigin = null;
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('btnSave').textContent = '保存映射';
    document.getElementById('inputOrigin').disabled = false;
  }

  function editItem(idx) {
    var m = mappings[idx];
    document.getElementById('inputOrigin').value = m.origin;
    document.getElementById('inputCity').value = m.city;
    editingOrigin = m.origin;
    document.getElementById('btnCancel').style.display = '';
    document.getElementById('btnSave').textContent = '更新映射';
    document.getElementById('inputOrigin').disabled = true;
    document.getElementById('inputCity').focus();
  }

  function deleteItem(idx) { doDelete(mappings[idx].origin); }

  document.getElementById('btnSave').addEventListener('click', async function () {
    var origin = document.getElementById('inputOrigin').value.trim();
    var city = document.getElementById('inputCity').value.trim();
    if (!origin) { toast('请输入群聊标识符', 'error'); return; }
    if (!city) { toast('请输入城市名', 'error'); return; }
    await saveMapping(origin, city);
  });

  document.getElementById('btnCancel').addEventListener('click', resetForm);

  document.getElementById('inputCity').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('btnSave').click();
  });
  document.getElementById('inputOrigin').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('inputCity').focus();
  });

  (async function () {
    try {
      await waitBridge(30);
      await bridge.ready();
      await loadMappings();
    } catch (e) {
      document.querySelector('.container').innerHTML = '<div style="padding:40px;color:#c0392b;text-align:center">Bridge SDK 加载失败，请刷新页面</div>';
    }
  })();
</script>
</body>
</html>
